name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Dependencies
        working-directory: chat-app/frontend
        run: npm install

      - name: Build React
        working-directory: chat-app/frontend
        run: npm run build

      - name: Sync Capacitor
        working-directory: chat-app/frontend
        run: npx cap sync android

      - name: Build APK
        working-directory: chat-app/frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chat-app-apk
          path: chat-app/frontend/android/app/build/outputs/apk/debug/app-debug.apk